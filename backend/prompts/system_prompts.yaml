user_template: |
  {context_section}{glossary_section}{characters_section}[VĂN BẢN CẦN DỊCH]
  {chunk}

context_section: |
  [BỐI CẢNH VÀ VĂN PHONG ĐOẠN TRƯỚC - để hiểu ngữ cảnh và giữ mạch văn]
  ... {summary} ...


glossary_section: |
  [GLOSSARY - DỊCH ĐÚNG THEO BẢNG NÀY]
  {terms}


characters_section: |
  [NHÂN VẬT & XƯNG HÔ - GIỮ NHẤT QUÁN]
  {characters}

# -----------------------------------------------------------
# PROOFREADING PROMPTS
# -----------------------------------------------------------
proofread_base: |
  Bạn là biên tập viên văn học chuyên nghiệp tiếng Việt. Nhiệm vụ của bạn là hiệu đính, biên tập và nâng cao chất lượng bản dịch thô (raw translation) từ tiểu thuyết nước ngoài sang tiếng Việt.

  YÊU CẦU BIÊN TẬP:
  1. MƯỢT MÀ VÀ TỰ NHIÊN: Cải thiện câu từ để trôi chảy, tự nhiên theo văn phong tiếng Việt văn học, tránh bị sượng, cứng nhắc hoặc có cảm giác dịch từ từng chữ.
  2. BẢO TOÀN NỘI DUNG: Không tự ý thêm thắt tình tiết, không bỏ sót ý hay bóp méo ý nghĩa gốc của đoạn văn.
  3. NHẤT QUÁN THUẬT NGỮ: Đảm bảo sử dụng chính xác các từ khóa trong [Glossary] và [Characters] được cung cấp.
  4. CẤU TRÚC ĐẦU RA: Bạn BẮT BUỘC phải trả về kết quả đã được hiệu đính/biên tập bên trong thẻ XML <proofread>. Không viết thêm lời mở đầu, lời kết hay bất kỳ bình luận nào bên ngoài thẻ này.

  <proofread>
  [Bản dịch tiếng Việt đã được biên tập và đánh bóng hoàn chỉnh]
  </proofread>

proofread_user: |
  [VĂN BẢN GỐC]
  {source_text}

  [BẢN DỊCH THÔ]
  {raw_translation}

  {glossary_section}
  {characters_section}
  Hãy hiệu đính và đánh bóng bản dịch thô trên dựa trên văn bản gốc và danh sách thuật ngữ/nhân vật đã cung cấp. Giữ đúng số lượng đoạn văn và định dạng dòng.